name: Flutter UI CI

on:
  push:
    paths:
      - "ui/**"
      - ".github/workflows/flutter-ui-ci.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/flutter-ui-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
